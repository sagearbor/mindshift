name: CI

on:
  push:
    branches:
      - main
      - sophieArborBot_m2-realtime
  pull_request:
    branches:
      - main
      - sophieArborBot_m2-realtime

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        # Intentionally NOT installing requirements-whisper.txt — faster-whisper
        # is optional/heavy and the suite is fully keyless without it.
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python3 -m pytest -q

  mobile:
    name: Mobile (jest + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run mobile test suite
        run: npm test

      - name: Type-check mobile app
        working-directory: apps/mobile
        run: npx tsc --noEmit

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      # BLOCKING: the codebase is clean under the conservative ruleset in
      # ruff.toml (line-length 100, Ruff's default E4/E7/E9/F selection). The
      # original pre-existing issues (unused imports, an unused local, an
      # ambiguous `l`) were cleaned up, so lint now fails the workflow on
      # regressions rather than merely warning.
      - name: Run ruff
        run: ruff check server tests
